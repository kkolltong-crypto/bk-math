<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f13" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="bk 수학" />
  <title>bk 수학</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f13; color: #e8e8f0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    #root { min-height: 100vh; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 12px; }
    .spinner { width: 36px; height: 36px; border: 3px solid #2a2a3a; border-top-color: #6c63ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #8888aa; font-size: 13px; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="spinner"></div>
      <p>bk 수학 로딩 중...</p>
    </div>
  </div>

  <!-- React + Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 앱 메인 -->
  <script type="text/babel" src="bk-math-full.jsx"></script>

  <script>
    // PWA 서비스워커 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW error', e));
      });
    }

    // React 앱 마운트 (bk-math-full.jsx 로드 후)
    window.addEventListener('load', () => {
      setTimeout(() => {
        const root = document.getElementById('root');
        if (window.BkMathApp) {
          root.innerHTML = '';
          ReactDOM.createRoot(root).render(React.createElement(window.BkMathApp));
        }
      }, 800);
    });
  </script>
</body>
</html>
